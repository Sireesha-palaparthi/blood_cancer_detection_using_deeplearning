<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Cancer Classification - Predict</title>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,600,700" rel="stylesheet">
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.4.0/css/font-awesome.min.css">

    <!-- Bootstrap -->
    <link href="static/css/bootstrap.min.css" rel="stylesheet">
    <link href="static/css/style.css" rel="stylesheet">
    <link href="static/css/responsive.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7fa;
        }

        .upload-box {
            margin: 40px auto;
            max-width: 620px;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .upload-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        /* Custom File Upload Styling */
        .custom-file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .custom-file-upload input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3498db;
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            width: 100%;
            margin-bottom: 20px;
        }

        .file-upload-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .file-upload-btn i {
            margin-right: 10px;
        }

        .file-name-display {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-top: 8px;
            text-align: center;
            word-break: break-all;
        }

        /* Classify Button */
        .classify-btn {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            margin-top: 20px;
        }

        .classify-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
            background: linear-gradient(90deg, #2ecc71, #27ae60);
        }

        .result-section {
            margin-top: 40px;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .prediction-text {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .confidence-text {
            font-size: 1.4rem;
            font-weight: 500;
            color: #27ae60;
        }

        .error-text {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .uploaded-img {
            max-height: 420px;
            border-radius: 10px;
            margin: 25px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            border: 1px solid #eee;
        }

        .section-title {
            text-align: center;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<header id="masthead" class="site-header site-header-white">
    <nav id="primary-navigation" class="site-navigation">
        <div class="container">
            <div class="navbar-header">
                <a class="site-title" style="font-size:35px;color:white">
                    <span>BLOOD CANCER</span>
                </a>
            </div>

            <div class="collapse navbar-collapse" id="agency-navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><strong><a href="/loginhomepage" style="font-size: 20px">Home</a></strong></li>
                    <li class="active"><strong><a href="/predict" style="font-size: 20px">Predict</a></strong></li>
                    <li><strong><a href="/" style="font-size: 20px">Logout</a></strong></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<div id="hero" class="hero overlay subpage-hero blog-hero">
    <div class="hero-content">
        <div class="hero-text">
            <h1>BLOOD CANCER CLASSIFICATION</h1>
        </div>
    </div>
</div>

<!-- Main Content -->
<main id="main" class="site-main">
    <section class="site-section subpage-site-section section-portfolio">
        <div class="container upload-box">

            <h2 class="section-title">Upload & Classify Blood Smear Image</h2>

            <!-- Upload Form -->
            <form action="{{ url_for('predict') }}" method="POST" enctype="multipart/form-data">
                <div class="text-center">
                    <div class="custom-file-upload">
                        <label for="file-upload" class="file-upload-btn">
                            <i class="fa fa-cloud-upload"></i> Choose Image
                        </label>
                        <input id="file-upload" type="file" name="file" accept="image/*" required />
                        <div class="file-name-display" id="file-name">No file chosen</div>
                    </div>

                    <button type="submit" class="classify-btn">
                        <i class="fa fa-search"></i> Classify Image
                    </button>
                </div>
            </form>

            <!-- Show selected file name (JavaScript) -->
            <script>
                document.getElementById('file-upload').addEventListener('change', function(e) {
                    const fileName = e.target.files[0]?.name || 'No file chosen';
                    document.getElementById('file-name').textContent = fileName;
                });
            </script>

            <!-- Error Message -->
            {% if error %}
            <div class="alert alert-danger mt-4 text-center error-text">
                {{ error }}
            </div>
            {% endif %}

            <!-- Prediction Result -->
            {% if prediction %}
            <div class="result-section text-center">
                <h3 style="color: #27ae60; margin-bottom: 25px; font-weight: 600;">
                    Prediction Result
                </h3>

                {% if image_url %}
                <img src="{{ image_url }}" alt="Uploaded Image" class="uploaded-img img-fluid">
                {% endif %}

                <div style="margin-top: 30px;">
                    <p class="prediction-text">
                        {{ prediction }}
                    </p>
                    <p class="confidence-text">
                        Confidence: {{ confidence }}%
                    </p>
                </div>
            </div>
            {% endif %}

        </div>
    </section>
</main>

<!-- Scripts -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="static/js/bootstrap.min.js"></script>
<script src="static/js/bootstrap-select.min.js"></script>
<script src="static/js/jquery.slicknav.min.js"></script>
<script src="static/js/jquery.countTo.min.js"></script>
<script src="static/js/jquery.shuffle.min.js"></script>
<script src="static/js/script.js"></script>

</body>
</html>
